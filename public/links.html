<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-brand="display_name">Pitombo Lanches - Links</title>
  <script src="/js/theme.js"></script>
  <script src="/js/auth-helper.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg, #f4f4f4);
      color: var(--text, #111);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .landing-container {
      width: 100%;
      max-width: 480px; /* Mobile focused container */
      background: var(--card-bg, #fff);
      min-height: 100vh;
      position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }
    
    .banner-container {
      width: 100%;
      height: 160px;
      background-color: var(--primary, #e8420a);
      background-size: cover;
      background-position: center;
      position: relative;
    }
    
    .header-content {
      padding: 0 2rem;
      text-align: center;
      margin-top: -50px;
      position: relative;
      z-index: 2;
    }
    
    .brand-logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: contain;
      background: #fff;
      border: 4px solid #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin: 0 auto 1rem;
      display: none;
    }
    
    .brand-initial {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--primary, #e8420a);
      color: #fff;
      font-size: 3rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin: 0 auto 1rem;
    }
    
    .store-name {
      font-size: 1.6rem;
      font-weight: 900;
      margin: 0 0 0.2rem 0;
      letter-spacing: -0.5px;
    }
    
    .store-slogan {
      font-size: 0.95rem;
      color: #666;
      margin: 0 0 1rem 0;
      line-height: 1.4;
    }

    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg-alt, #f8f9fa);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #555;
      font-weight: 600;
      margin-bottom: 0.5rem;
      border: 1px solid #eee;
    }

    .links-content {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
    }
    
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      width: 100%;
      padding: 1.2rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.05rem;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      box-sizing: border-box;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn-primary {
      background: var(--btn-main, var(--primary, #e8420a));
      color: #fff;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    
    .btn-primary:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }
    
    .btn-whatsapp {
      background: #25d366;
      color: #fff;
      box-shadow: 0 4px 0 #1da851;
    }
    
    .btn-whatsapp:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }
    
    .social-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
    }
    
    .social-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 1.4rem;
      color: #333;
      transition: background 0.2s;
    }
    
    .social-btn:hover {
      background: #e0e0e0;
    }

    .footer-content {
      padding: 2rem;
      text-align: center;
      margin-top: auto;
    }

    .share-btn {
      background: transparent;
      border: 2px solid #ddd;
      color: #555;
      padding: 0.8rem 1.5rem;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .store-address {
      font-size: 0.85rem;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="landing-container">
    <div class="banner-container" id="storeBanner">
      <!-- Banner image will be set as background via JS -->
    </div>
    
    <div class="header-content">
      <img id="storeLogo" src="" alt="Logo" class="brand-logo">
      <div id="initialLogo" class="brand-initial">P</div>
      
      <h1 class="store-name" id="storeNameText">Pitombo Lanches</h1>
      <p class="store-slogan" id="storeSubtitleText">Carregando...</p>
      
      <div id="operatingHoursContainer" style="display:none;">
        <div class="info-badge">
          🕒 <span id="operatingHoursText">Aberto agora</span>
        </div>
      </div>
    </div>
    
    <div class="links-content">
      <a href="/" class="link-btn btn-primary">
        🍔 Fazer Pedido (Cardápio)
      </a>
      
      <a href="#" id="linkWhatsapp" target="_blank" class="link-btn btn-whatsapp" style="display:none;">
        💬 Falar no WhatsApp
      </a>
      
      <div class="social-row" id="socialRow">
        <a href="#" id="linkInstagram" target="_blank" class="social-btn" style="display:none;">📸</a>
        <a href="#" id="linkFacebook" target="_blank" class="social-btn" style="display:none;">📘</a>
      </div>
    </div>
    
    <div class="footer-content">
      <button onclick="shareLink()" class="share-btn">
        🔗 Compartilhar Link
      </button>
      
      <p class="store-address" id="storeAddressText"></p>
    </div>
  </div>

  <script src="/js/auth-helper.js"></script>
  <script src="/js/links.js"></script>
</body>
</html>
