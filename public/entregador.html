<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando...</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/entregador.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header-container">
      <h1>🛵 <span data-brand="display_name">Pitombo Lanches</span> - Entrega</h1>
      <div class="header-nav">
        <a href="/" class="nav-link">Loja</a>
        <a href="/admin" class="nav-link">Admin</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="entregador-tabs">
      <button class="etab-btn etab-ativo" data-tab="ativas" onclick="trocarAba('ativas')">🛵 Em Entrega</button>
      <button class="etab-btn" data-tab="historico" onclick="trocarAba('historico')">📋 Histórico</button>
    </div>

    <div id="tab-ativas">
      <div id="listaEntregas" class="delivery-grid">
        <div class="loading">Carregando pedidos de entrega...</div>
      </div>
    </div>

    <div id="tab-historico" style="display:none;">
      <div id="listaHistorico" class="delivery-grid">
        <div class="loading">Carregando histórico...</div>
      </div>
    </div>
  </main>

  <script src="/js/currency.js"></script>
  <script src="/js/entregador.js"></script>
</body>
</html>
